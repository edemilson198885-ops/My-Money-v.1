  <meta name="theme-color" content="#6f2cff" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>My Money</title>
  <link rel="manifest" href="./manifest.json?v=1.1.4" />
  <script>
    window.APP_VERSION = "1.1.4";
    (function () {
      var storedVersion = localStorage.getItem('mm_app_version');
      if (storedVersion !== window.APP_VERSION) {
        localStorage.setItem('mm_app_version', window.APP_VERSION);
        if (storedVersion) {
          setTimeout(function () { location.reload(); }, 60);
        }
      }
    })();
  </script>
  <link rel="stylesheet" href="./assets/css/app.css?v=1.1.4" />
</head>
